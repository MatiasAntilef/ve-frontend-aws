<input
  type="file"
  class="file-input file-input-bordered"
  accept=".mp4,video/mp4"
  (change)="onFileChange($event)"
/>

<dialog #optionsModal class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Opciones del video</h3>

    @if (selectedFile()) {
      <p class="mt-2 text-sm text-base-content/70">
        {{ selectedFile()!.name }}
      </p>
    }

    <div class="mt-6 space-y-4">
      <label class="form-control w-full">
        <span class="label-text mb-2">¿Transcribir?</span>
        <select
          class="select select-bordered w-full"
          [value]="transcribe() ? 'yes' : 'no'"
          (change)="transcribe()"
        >
          <option value="yes">Sí</option>
          <option value="no">No</option>
        </select>
      </label>

      <label class="form-control w-full">
        <span class="label-text mb-2">¿Doblar?</span>
        <select
          class="select select-bordered w-full"
          [value]="dub() ? 'yes' : 'no'"
          (change)="dub()"
        >
          <option value="yes">Sí</option>
          <option value="no">No</option>
        </select>
      </label>
    </div>

    <div class="modal-action">
      <button class="btn btn-ghost" type="button" (click)="closeModal()">Cancelar</button>
      <button class="btn btn-primary" type="button" (click)="confirmUpload()">Confirmar</button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button>Cerrar</button>
  </form>
</dialog>
