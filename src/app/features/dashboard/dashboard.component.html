<div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-3">
  @for (video of $videos(); track video.id) {
    <app-video-card
      class="w-full"
      [id]="video.id"
      [fileName]="video.fileName"
      [screenshot]="video.screenshot"
    />
  } @empty {
    <h3>No hay videos</h3>
  }
</div>
